services:
  rabbitmq:
    image: rabbitmq:4.3.2-management
    container_name: ai-agents-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  postgres:
    image: postgres:17
    container_name: ai-agents-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai-agents-DB
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  discovery-server:
    build:
      context: ./infrastructure/discovery-server
    container_name: ai-agents-discovery-server
    ports:
      - "8761:8761"
    depends_on:
      - rabbitmq
      - postgres

  backend:
    build:
      context: ./backend/ai-agents-backend
    container_name: ai-agents-backend
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai-agents-DB
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    depends_on:
      - postgres
      - rabbitmq
      - discovery-server


volumes:
  rabbitmq-data:
  postgres-data: