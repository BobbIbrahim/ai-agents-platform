<h2 class="title">Agents</h2>

<div class="success-message" *ngIf="successMessage">
  {{ successMessage }}
</div>

<div class="error-message" *ngIf="errorMessage">
  {{ errorMessage }}
</div>

<div class="empty-state" *ngIf="isLoading">
  Loading agents...
</div>

<div class="agent-list" *ngIf="!isLoading && agents.length > 0">
  <div class="card" *ngFor="let agent of agents">
    <h3>
      <a [routerLink]="['/agents', agent.id]">
        {{ agent.name }}
      </a>
    </h3>

    <p><strong>Role:</strong> {{ agent.role }}</p>
    <p>{{ agent.description }}</p>

    <button class="delete-btn" type="button" (click)="deleteAgent(agent.id)">
      Delete
    </button>
  </div>
</div>

<div class="empty-state" *ngIf="!isLoading && agents.length === 0 && !errorMessage">
  No agents found.
</div>
